body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯爾時文殊師利白佛言世尊一切諸字母云何一切諸法入於此及陀羅尼字佛告文殊師利一切諸法入於字母及陀羅尼字文殊師利如稱阿上字時是無常聲稱阿引去字時是遠離我聲稱伊上字時是諸根廣博聲稱伊引去字時是世間災害聲稱塢上字時是多種逼迫聲稱污引字時是損減世間多有情聲稱𠴊字時是直軟相續有情聲稱𠴊引去字時是斷染遊戲聲稱力字時是生法相聲稱𡃖引字時是三有染相聲稱曀字時是起所求聲稱愛字時是威儀勝聲稱污字時是取聲稱奧字時是化生之聲稱暗字時是無我所聲稱惡字時是沈沒聲稱迦上字時是入業異熟聲稱佉上字時是出一切法等虛空聲稱誐上字時是甚深法聲稱伽去字時是摧稠密無明暗冥聲稱仰字時是五趣清淨聲稱左字時是四聖諦聲稱磋上字時是不覆欲聲稱惹字時是超老死聲稱酇才舸反字時是制伏惡語言聲稱娘上字時是制伏他魔聲稱吒上字時是斷語聲稱咤上字時是出置答聲稱拏上字時是出攝伏魔諍聲稱荼去字時是滅穢境界聲稱拏鼻聲呼字時是除諸煩惱聲稱多上字時是真如無間斷聲稱他上字時是勢力進無畏聲稱娜字時是調伏律儀寂靜安隱聲稱馱字時是七聖財聲稱曩字時是遍知名色聲稱跛字時是勝義聲稱頗字時是得果作證聲稱麼字時是解脫繫縛聲稱婆字時是出生三有聲稱莽鼻聲呼字時是息憍慢聲稱野字時是佛通達聲稱囉梨假反字時是樂不樂勝義聲稱砢字時是斷愛支聲稱嚩無可反字時是最上乘聲稱捨字時是出信進念定慧聲稱灑字時是制伏六處得六神通智聲稱娑上字時是現證一切智聲稱賀字時是害煩惱離欲聲稱乞灑二合字時是一切文字究竟無言說聲文殊師利此謂字母義一切諸字入於此中
